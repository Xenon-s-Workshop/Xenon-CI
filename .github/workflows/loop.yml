name: CI for QuizBots

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  mail: ${{ secrets.GITHUBMAIL }}
  username: ${{ secrets.GITHUBNAME }}
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true

jobs:
  quizbot:
    name: TSS-Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone repo
        run: |
          git clone https://${{ env.username }}:${{ secrets.GH_TOKEN }}@github.com/${{ secrets.REPOSLUG }} tss

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget curl unzip xvfb \
            fontconfig \
            fonts-noto fonts-noto-cjk fonts-noto-color-emoji \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2 libpangocairo-1.0-0 libpango-1.0-0 \
            libcups2 libdrm2 libx11-xcb1 libxcb1 libxkbcommon0

      - name: Verify Bengali fonts
        run: |
          fc-list | grep -i "noto" || true

      - name: Install Python dependencies
        run: |
          cd tss
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run bot (Playwright headless)
        run: |
          cd tss
          xvfb-run -a python main.py
        timeout-minutes: 340
        continue-on-error: true

  looper:
    name: Run QuizBot loop
    needs: quizbot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git config
        run: |
          git config --global user.email "${{ env.mail }}"
          git config --global user.name "${{ env.username }}"

      - name: Trigger loop commit
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/${GITHUB_REPOSITORY} temp
          cd temp
          git commit --allow-empty -m "[LOOP] Re-run workflow"
          git push origin main
